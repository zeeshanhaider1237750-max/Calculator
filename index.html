<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Calculator</h1>
     <div id="main" class="main">
        <div id="display" class="row"></div>
        <div id="first-row" class="row">
            <div id="add" class="button">+</div>
            <div id="subtract" class="button">-</div>
            <div id="multiply" class="button">x</div>
            <div id="divide" class="button">÷</div>
        </div>
         <div id="second-row" class="row">
            <div id="seven" class="button">7</div>
            <div id="eight" class="button">8</div>
            <div id="nine" class="button">9</div>
            <div id="AC" class="button">AC</div>
         </div>
         <div id="third-row" class="row">
            <div id="four" class="button">4</div>
            <div id="five" class="button">5</div>
            <div id="six" class="button">6</div>
            <div id="del" class="button">DEL</div>
         </div>
         <div id="fourth-row" class="row">
            <div id="one" class="button">1</div>
            <div id="two" class="button">2</div>
            <div id="three" class="button">3</div>
            <div id="percent" class="button">%</div>
         </div>
         <div id="fifth-row" class="row">
            <div id="zero" class="button">0</div>
            <div id="equal" class="button">=</div>
         </div>
         <div id="sixth-row" class="row">
            <div id="decimal-point" class="button">.</div>
            <div id="S-D" class="button">S/D</div>
            <div id="sign-change" class="button">+/-</div>
         </div>
     </div>
</body>
</html>
