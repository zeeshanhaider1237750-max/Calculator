<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Calculator</h1>
     <div id="main" class="main">
        <div id="display" class="display"></div>
        <div id="first-row" class="first-row">
            <div id="add-sign" class="button">+</div>
            <div id="subtract-sign" class="button">-</div>
            <div id="multiply-sign" class="button">x</div>
            <div id="divide-sign" class="button">÷</div>
        </div>
         <div id="second-row" class="second-row">
            <div id="seven" class="button">7</div>
            <div id="eight" class="button">8</div>
            <div id="nine" class="button">9</div>
            <div id="AC" class="button">AC</div>
         </div>
         <div id="third-row" class="third-row">
            <div id="four" class="button">4</div>
            <div id="five" class="button">5</div>
            <div id="six" class="button">6</div>
            <div id="DEL" class="button">DEL</div>
         </div>
         <div id="fourth-row" class="fourth-row">
            <div id="one" class="button">1</div>
            <div id="two" class="button">2</div>
            <div id="three" class="button">3</div>
            <div id="percent-sign" class="percentage">%</div>
         </div>
         <div id="fifth-row" class="fifth-row">
            <div id="zero" class="button">0</div>
            <div id="Enter" class="button">Enter</div>
         </div>
         <div id="sixth-row" class="sixth-row">
            <div id="decimal-point" class="button">.</div>
            <div id="S<>D" class="button">S<-->D</div>
            <div id="sign-change" class="sign-change">+/-</div>
         </div>
     </div>
</body>
</html>
